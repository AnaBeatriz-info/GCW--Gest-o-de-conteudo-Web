<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Resumo Rápido</title>
    <link rel="stylesheet" type="text/css" href="css/estilo.css"/>
    <link rel="stylesheet" href="css/materialize.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="nav-wrapper teal lighten-2">
            <div class="container">
                <a class="brand-logo font">Resumo Rápido</a>
                <ul class="right hide-on-med-and-down">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="resumo.html">Resumos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 30px;">
        <h5 class="center-align font">Crie sua conta para receber novidades</h5>
        <div class="row card-panel" style="margin-top: 20px;">
            <form class="col s12">
                <div class="row">
                    <div class="input-field col s12 m10 offset-m1">
                        <i class="material-icons prefix">account_circle</i>
                        <input id="nome" type="text" class="validate" required>
                        <label for="nome">Nome Completo</label>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12 m10 offset-m1">
                        <i class="material-icons prefix">email</i>
                        <input id="email" type="email" class="validate" required>
                        <label for="email">Email</label>
                        <span class="helper-text" data-error="Email inválido" data-success="Válido">Ex: voce@gmail.com</span>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12 m10 offset-m1">
                        <i class="material-icons prefix">phone</i>
                        <input id="icon_telephone" type="tel" class="validate">
                        <label for="icon_telephone">Telefone (opcional)</label>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12 m10 offset-m1">
                        <i class="material-icons prefix">calendar_month</i>
                        <input type="text" class="datepicker" id="birthday" required>
                        <label for="birthday">Data de Nascimento</label>
                    </div>
                </div>

                <div class="center-align">
                    <button class="btn-large waves-effect waves-light teal" type="submit">
                        Finalizar Cadastro <i class="material-icons right">send</i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/materialize.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var elems = document.querySelectorAll('.datepicker');
            M.Datepicker.init(elems, {
                format: 'dd/mm/yyyy',
                yearRange: 80,
                maxDate: new Date(),
                showClearBtn: true,
                i18n: {
                    cancel: 'Cancelar', clear: 'Limpar', done: 'Ok',
                    months: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
                    monthsShort: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
                    weekdays: ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'],
                    weekdaysShort: ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'],
                    weekdaysAbbrev: ['D','S','T','Q','Q','S','S']
                }
            });
        });
    </script>
</body>
</html>
